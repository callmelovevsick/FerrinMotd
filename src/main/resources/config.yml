# FerrinMotd Configuration

# Interval in seconds to switch the MOTD
interval: 60

# If true, picks a random MOTD from motd.txt
random: true

# If true, the max slots will follow the logic:
# 0 players online -> 0/0
# N players online -> N/(N+1)
just-one-more-slot: true

# Prefix for plugin messages
prefix: "&8[&bFerrinMotd&8] &f"